<section class="catalogo-container">
  <!-- Nubes de fondo animadas -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>

  <!-- Header del catálogo -->
  <div class="catalogo-header">
    <h1>Catálogo de Cobertores</h1>
    <p class="subtitle">Descubre nuestros cobertores premium en la nube</p>
  </div>

  <!-- Contenedor de productos -->
  <div class="productos-grid">
    @for (cobertor of cobertores(); track cobertor.id) {
      <div class="producto-card">
        <div class="producto-icon">☁️</div>
        <h3>{{ cobertor.nombre }}</h3>
        <p class="producto-desc">{{ cobertor.descripcion || cobertor.nombre }}</p>
        <div class="producto-precio">${{ cobertor.precio }}</div>
        <button class="btn-carrito" (click)="agregarAlCarrito(cobertor)">Agregar al Carrito</button>
      </div>
    }
  </div>
</section>
