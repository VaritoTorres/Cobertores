<nav class="menu-container">
  <div class="menu-content">
    <!-- Logo/Título -->
    <div class="menu-logo" (click)="irAVista('inicio')" style="cursor: pointer;">
      <span class="logo-icon">☁️</span>
      <h2>NubeCobertores</h2>
    </div>

    <!-- Opciones del menú -->
    <ul class="menu-links">
      <li><button class="menu-link" (click)="irAVista('inicio')">Inicio</button></li>
      <li><button class="menu-link" (click)="irAVista('catalogo')">Catálogo</button></li>
      <li><button class="menu-link" (click)="irAVista('contacto')">Contacto</button></li>
    </ul>

    <!-- Carrito y Administración a la derecha -->
    <div class="menu-acciones">
      <button class="admin-btn" (click)="abrirAdminPassword()" title="Panel de Administración">
        <span class="admin-icon">⚙️</span>
        <span class="admin-label">Admin</span>
      </button>
      <button class="carrito-btn" (click)="toggleCarrito()">
        <span class="carrito-icon">🛒</span>
        <span class="carrito-label">Carrito</span>
      </button>
    </div>
  </div>
</nav>

<!-- Modal del carrito -->
<div class="carrito-modal" [class.active]="mostrarCarrito()" (click)="cerrarCarritoSiEsOverlay($event)">
  <div class="carrito-modal-content" (click)="$event.stopPropagation()">
    <button class="btn-cerrar-carrito" (click)="toggleCarrito()">✕</button>
    <app-carrito></app-carrito>
  </div>
</div>

<!-- Modal de contraseña para administración -->
<app-admin-password></app-admin-password>
