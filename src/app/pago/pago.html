<div class="pago-container">
  <h2>Finalizar Pago</h2>
  <p class="subtitle">Completa tus datos para procesar el pedido de forma segura</p>

  <form class="pago-form">
    <div class="row">
      <label for="card-name">Nombre en la tarjeta</label>
      <input type="text" id="card-name" placeholder="Ej. Juan Pérez" />
    </div>

    <div class="row">
      <label for="card-number">Número de tarjeta</label>
      <input type="text" id="card-number" placeholder="0000 0000 0000 0000" />
    </div>

    <div class="row split">
      <div>
        <label for="card-expiry">Fecha de expiración</label>
        <input type="text" id="card-expiry" placeholder="MM/AA" />
      </div>
      <div>
        <label for="card-cvv">CVV</label>
        <input type="password" id="card-cvv" placeholder="123" />
      </div>
    </div>

    <div class="total-badge">
      <div class="total-label">
        <span class="icon">✨</span> Total a pagar
      </div>
      <div class="total-amount">{{ totalAmount | currency:'USD':'symbol':'1.2-2' }} <span class="currency">MXN</span></div>
    </div>

   <div class="actions">
  <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
  
  <button type="button" class="btn btn-primary" (click)="confirmarPago()">Pagar Ahora</button>
</div>
  </form>
</div>
