<section class="contacto-container">
  <!-- Nubes de fondo animadas -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <!-- Header -->
  <div class="contacto-header">
    <h1>Contacto</h1>
    <p class="subtitle">Nos encantaría saber de ti ☁️</p>
  </div>

  <!-- Contenedor de contacto -->
  <div class="contacto-wrapper">
    <!-- Información de contacto -->
    <div class="contacto-info">
      <div class="info-card">
        <div class="info-icon">📧</div>
        <h3>Email</h3>
        <p>contacto@nubecobertores.com</p>
      </div>

      <div class="info-card">
        <div class="info-icon">📱</div>
        <h3>Teléfono</h3>
        <p>+56 9 1234 5678</p>
      </div>

      <div class="info-card">
        <div class="info-icon">📍</div>
        <h3>Ubicación</h3>
        <p>Santiago, Chile</p>
      </div>

      <div class="info-card">
        <div class="info-icon">⏰</div>
        <h3>Horario</h3>
        <p>Lun - Vie: 9:00 - 18:00</p>
      </div>
    </div>

    <!-- Formulario de contacto -->
    <div class="contacto-form-wrapper">
      <form class="contacto-form">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required>
        </div>

        <div class="form-group">
          <label for="asunto">Asunto</label>
          <input type="text" id="asunto" placeholder="¿En qué podemos ayudarte?" required>
        </div>

        <div class="form-group">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..." rows="5" required></textarea>
        </div>

        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
      </form>
    </div>
  </div>
</section>
